<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ invoice.invoice_number }} · Proforma Invoice</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    @media print {
      @page { size: A4 portrait; margin: 6mm; }
      body { background: #fff !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="quote-print-body">

  <div class="quote-toolbar no-print">
    <a href="{{ url_for('proforma_invoices.list_proforma_invoices') }}" class="btn btn-ghost btn-sm">← All proforma invoices</a>
    <div class="flex gap-8">
      {% if packing_lists %}
      <a href="{{ url_for('packing_lists.view_packing_list', packing_list_id=packing_lists[0].id) }}" class="btn btn-ghost btn-sm">📦 View packing list</a>
      {% else %}
      <a href="{{ url_for('packing_lists.new_packing_list', proforma_invoice_id=invoice.id) }}" class="btn btn-ghost btn-sm">📦 Create packing list</a>
      {% endif %}
      <a href="{{ url_for('proforma_invoices.edit_proforma_invoice', proforma_invoice_id=invoice.id) }}" class="btn btn-ghost btn-sm">Edit</a>
      <form method="POST" action="{{ url_for('proforma_invoices.delete_proforma_invoice', proforma_invoice_id=invoice.id) }}" onsubmit="return confirm('Delete this proforma invoice?');">
        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
      </form>
      <button type="button" class="btn btn-primary btn-sm" onclick="window.print()">🖨 Generate invoice only</button>
      <a href="{{ url_for('proforma_invoices.combined_proforma_invoice', proforma_invoice_id=invoice.id) }}" class="btn btn-primary btn-sm">🖨 Generate combined document</a>
    </div>
  </div>

  {% include 'proforma_invoices/_sheet.html' %}
  {% include 'proforma_invoices/_annexure.html' %}

</body>
</html>
