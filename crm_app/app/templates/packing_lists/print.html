<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ packing_list.packing_list_number }} · Packing Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    @media print {
      @page { size: A4 portrait; margin: 8mm; }
      body { background: #fff !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="quote-print-body">

  <div class="quote-toolbar no-print">
    <a href="{{ url_for('packing_lists.list_packing_lists') }}" class="btn btn-ghost btn-sm">← All packing lists</a>
    <div class="flex gap-8">
      {% if packing_list.proforma_invoice_id %}
      <a href="{{ url_for('proforma_invoices.view_proforma_invoice', proforma_invoice_id=packing_list.proforma_invoice_id) }}" class="btn btn-ghost btn-sm">View proforma</a>
      <a href="{{ url_for('proforma_invoices.combined_proforma_invoice', proforma_invoice_id=packing_list.proforma_invoice_id) }}" class="btn btn-ghost btn-sm">Combined document</a>
      {% endif %}
      <a href="{{ url_for('packing_lists.edit_packing_list', packing_list_id=packing_list.id) }}" class="btn btn-ghost btn-sm">Edit</a>
      <form method="POST" action="{{ url_for('packing_lists.delete_packing_list', packing_list_id=packing_list.id) }}" onsubmit="return confirm('Delete this packing list?');">
        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
      </form>
      <button type="button" class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print / Save as PDF</button>
    </div>
  </div>

  {% include 'packing_lists/_sheet.html' %}

</body>
</html>
