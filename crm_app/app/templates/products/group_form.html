{% extends "base.html" %}
{% block title %}{{ 'Edit group' if group else 'New group' }}{% endblock %}
{% block content %}

<div class="topbar">
  <div>
    <div class="eyebrow">Catalog</div>
    <h1>{{ 'Edit group' if group else 'New group' }}</h1>
    <div class="text-sm text-soft">Inside: {{ parent.name if parent else 'Products (root)' }}</div>
  </div>
</div>

<div class="card" style="max-width:480px;">
  <form method="POST">
    {% if not group and parent %}<input type="hidden" name="parent_id" value="{{ parent.id }}">{% endif %}
    <div class="field">
      <label for="name">Group name<span class="required-mark">*</span></label>
      <input type="text" id="name" name="name" required value="{{ group.name if group else '' }}">
    </div>
    <button type="submit" class="btn btn-primary">{{ 'Save' if group else 'Create group' }}</button>
    <a href="{{ url_for('products.browse', group_id=parent.id if parent else None) }}" class="btn btn-ghost">Cancel</a>
  </form>
</div>

{% endblock %}
